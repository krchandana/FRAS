<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
    }

    .container {
        max-width: 620px;
        margin: 30px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .message {
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 20px;
        text-align: center;
    }

    .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .form-group {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: #333;
        font-weight: bold;
        font-size: 14px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
    }

    input[readonly] {
        background: #f5f5f5;
        color: #666;
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    .btn {
        padding: 12px 16px;
        border: none;
        border-radius: 4px;
        text-decoration: none;
        text-align: center;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }

    .btn-save {
        background: #28a745;
        color: white;
        flex: 1;
    }

    .btn-save:hover {
        background: #218838;
    }

    .btn-back {
        background: #6c757d;
        color: white;
        flex: 1;
    }

    .btn-back:hover {
        background: #5a6268;
    }
</style>
</head>
<body>
<div class="container">
    <h2>Edit Student</h2>

    {% if success %}
    <div class="message success">{{ success }}</div>
    {% endif %}

    {% if error %}
    <div class="message error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" value="{{ student[0] }}" readonly>
        </div>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required value="{{ student[1] }}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="program">Program</label>
                <select id="program" name="program" required onchange="updateYears()">
                    {% for program in programs %}
                    <option value="{{ program }}" {% if student[2] == program %}selected{% endif %}>{{ program }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="year">Year</label>
                <select id="year" name="year" required>
                    {% if student[2] in programs %}
                        {% for y in programs[student[2]].years %}
                        <option value="{{ y }}" {% if student[3] == y %}selected{% endif %}>Year {{ y }}</option>
                        {% endfor %}
                    {% endif %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="section">Section</label>
            <select id="section" name="section" required>
                <option value="A" {% if student[4] == 'A' %}selected{% endif %}>Section A</option>
                <option value="B" {% if student[4] == 'B' %}selected{% endif %}>Section B</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ student[5] if student[5] else '' }}">
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" value="{{ student[6] if student[6] else '' }}">
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-save">Save Changes</button>
            <a href="/student_details" class="btn btn-back">Back</a>
        </div>
    </form>
</div>

<script>
    const programs = {{ programs | tojson }};

    function updateYears() {
        const program = document.getElementById('program').value;
        const yearSelect = document.getElementById('year');
        const currentYear = '{{ student[3] }}';

        yearSelect.innerHTML = '';

        if (program && programs[program]) {
            programs[program].years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = 'Year ' + year;
                if (String(year) === String(currentYear)) {
                    option.selected = true;
                }
                yearSelect.appendChild(option);
            });
        }
    }
</script>
</body>
</html>
