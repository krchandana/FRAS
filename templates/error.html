<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>File Too Large</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 40px; color: #333; }
      .container { max-width: 700px; margin: 0 auto; }
      .card { background: #fff; border: 1px solid #e1e1e1; padding: 24px; border-radius: 8px; }
      a.button { display: inline-block; margin-top: 16px; padding: 10px 14px; background:#667eea; color:#fff; text-decoration:none; border-radius:4px; }

  <body>
    <div class="container">
      <div class="card">
        <h1>File Too Large</h1>
        <p>{{ error }}</p>
        <a class="button" href="/">Return Home</a>
      </div>
    </div>
  </body>
